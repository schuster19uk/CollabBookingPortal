<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Calendar</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 20px; 
            background: #f8f9fa; 
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 10px auto;
            width: 95%;
        }

        h1 { color: #2c3e50; margin: 0; }

        .btn-logout {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .btn-logout:hover {
            background-color: #c0392b;
        }

        .legend { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
        .box { width: 15px; height: 15px; border-radius: 3px; }

        #calendar { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
            /* Desktop consistency */
            max-width: 1100px; 
            width: 95%;
        }

        /* Header Count Styling */
        .hdr-date { font-weight: bold; color: #2c3e50; }
        .hdr-count {
            font-size: 0.75rem; color: #3788d8; font-weight: normal;
            background: #eef2ff; border-radius: 4px; padding: 2px 6px;
            display: inline-block; margin-top: 4px; border: 1px solid #d1d5db;
        }
        /* Red alert for days with NO bookings yet */
        .hdr-count.hdr-zero { color: #666; background: #f3f4f6; border-color: #e5e7eb; }

        @media (max-width: 767px) {
            body { margin: 10px; }
            .header-container { flex-direction: column; gap: 10px; text-align: center; }
            #calendar { width: 100%; padding: 10px; border-radius: 0; }
            .legend { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>📋 Management Dashboard</h1>
        <button id="logoutBtn" class="btn-logout">Logout</button>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="box" style="background: #28a745;"></div> Open Slot</div>
        <div class="legend-item"><div class="box" style="background: #3788d8;"></div> Booked</div>
        <div class="legend-item"><div class="box" style="background: #e74c3c;"></div> No Show</div>
    </div>

    <div id='calendar'></div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const logoutBtn = document.getElementById('logoutBtn');
        let isMobile = window.innerWidth < 768;

        // Function to handle unauthorized/expired session states safely
        function handleAuthError() {
            alert("Your session has expired. Please log in again.");
            // Redirect down to a login page if you have one, or force reload
            window.location.href = '/'; 
        }

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: isMobile ? 'timeGridDay' : 'timeGridWeek',
            timeZone: 'local',
            allDaySlot: false,
            height: 'auto',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: isMobile ? '' : 'timeGridWeek,timeGridDay'
            },

            // 1. Show Booked counts in headers
            dayHeaderContent: function(arg) {
                const allEvents = calendar.getEvents();
                
                // Filter for slots that are NOT available AND NOT marked as no-show
                const activeBookings = allEvents.filter(event => {
                    const isSameDay = event.start.toDateString() === arg.date.toDateString();
                    const isBooked = !event.extendedProps.available;
                    const isNotNoShow = !event.extendedProps.noShow;
                    
                    return isSameDay && isBooked && isNotNoShow;
                }).length;

                const countClass = activeBookings === 0 ? 'hdr-count hdr-zero' : 'hdr-count';
                let label = activeBookings === 1 ? '1 Active Booking' : `${activeBookings} Active Bookings`;
                
                return { 
                    html: `<div class="hdr-date">${arg.text}</div><div class="${countClass}">${label}</div>` 
                };
            },

            windowResize: function() {
                if (window.innerWidth < 768) calendar.changeView('timeGridDay');
                else calendar.changeView('timeGridWeek');
            },

            events: async function(info, successCallback, failureCallback) {
                try {
                    const res = await fetch('/api/admin/bookings');
                    
                    if (res.status === 401) {
                        handleAuthError();
                        return;
                    }

                    const data = await res.json();
                    
                    const formatted = data.map(row => ({
                        id: row.id,
                        title: row.title,
                        start: row.start,
                        backgroundColor: row.title.includes('🚩') ? '#e74c3c' : 
                                         (row.title === 'Available' ? '#28a745' : '#3788d8'),
                        allDay: false,
                        extendedProps: { 
                            available: row.is_available,
                            noShow: row.is_no_show 
                        }
                    }));
                    
                    successCallback(formatted);
                    calendar.render(); 
                } catch (err) {
                    console.error("Management Fetch Error:", err);
                    failureCallback(err);
                }
            },

            eventClick: async function(info) {
                const props = info.event.extendedProps;

                if (props.available) {
                    alert("This slot is still available.");
                    return;
                }

                if (props.noShow) {
                    alert("Already marked as No Show.");
                    return;
                }

                if (confirm(`Mark "${info.event.title}" as a No Show?`)) {
                    try {
                        const res = await fetch(`/api/admin/noshow/${info.event.id}`, { method: 'POST' });
                        
                        if (res.status === 401) {
                            handleAuthError();
                            return;
                        }

                        if (res.ok) {
                            // Refetch events so the color changes to Red immediately
                            calendar.refetchEvents();
                        } else {
                            alert("Failed to update status.");
                        }
                    } catch (err) {
                        alert("Error connecting to server.");
                    }
                }
            }
        });

        calendar.render();

        // --- LOGOUT BUTTON EVENT LISTENER ---
        logoutBtn.addEventListener('click', async () => {
            if (confirm("Are you sure you want to logout?")) {
                try {
                    const res = await fetch('/api/admin/logout', { method: 'POST' });
                    if (res.ok) {
                        window.location.href = '/'; // Send back to home or a login page
                    } else {
                        alert("Logout failed execution on server.");
                    }
                } catch (err) {
                    alert("Network error trying to log out.");
                }
            }
        });
      });
    </script>
</body>
</html>
