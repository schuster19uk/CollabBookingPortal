<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard — Collaborators Booking Portal</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/calendar.css">
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
    <!-- Management uses its own inline navbar (with logout button) instead of the shared one -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="brand-dot"></span>
            Management Dashboard
        </a>
        <div class="navbar-actions">
            <a href="/" class="btn-view-public">👁 View Booking Site</a>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>

    <div class="topbar-actions">
    <button class="btn btn-ghost" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9790;</button>
    </div>
    
    </nav>

    <div class="management-page">
        <div class="legend">
            <div class="legend-item">
                <div class="legend-box legend-box-open"></div> Open Slot
            </div>
            <div class="legend-item">
                <div class="legend-box legend-box-booked"></div> Booked
            </div>
            <div class="legend-item">
                <div class="legend-box legend-box-noshow"></div> No Show
            </div>
        </div>

        <div id='calendar' class="management"></div>
    </div>

    <dialog id="bookingModal">
        <h3 id="modalTitle" class="modal-header">Manage Booking</h3>
        <div class="modal-body">Select an action to perform on this slot:</div>
        <div class="modal-actions">
            <button id="modalNoShowBtn" class="modal-btn btn-modal-noshow">Mark as No Show</button>
            <button id="modalCancelBtn" class="modal-btn btn-modal-cancel">Cancel &amp; Reset Booking</button>
            <button id="modalCloseBtn" class="modal-btn btn-modal-close">Close</button>
        </div>
    </dialog>

  <script src="./js/calendar-management.js"></script>
    <script src="loader.js"></script>
    <script src="theme.js"></script>
    <div id="footer-container"></div>
</body>
</html>
